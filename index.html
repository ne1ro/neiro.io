---
layout: default
title: Functional programming, web development, DevOps
---

{% for post in site.posts %}
  <article>
    <div class="container">
      <h1>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </h1>
    </div>

    <content>
      {{ post.excerpt }}
    </content>

    <div id="tag-cloud" class="container">
      {{ post | tags | replace:', ','' }}
    </div>
  </article>
{% endfor %}
